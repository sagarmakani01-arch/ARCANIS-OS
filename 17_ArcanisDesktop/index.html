<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcanisDesktop</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/desktop.css">
  <link rel="stylesheet" href="css/taskbar.css">
  <link rel="stylesheet" href="css/windows.css">
  <link rel="stylesheet" href="css/notifications.css">
  <link rel="stylesheet" href="css/apps.css">
  <link rel="stylesheet" href="css/ai-center.css">
</head>
<body>
  <div id="desktop">
    <div id="wallpaper"></div>
    <div id="desktop-icons"></div>
    <div id="windows-container"></div>
    <div id="taskbar">
      <button id="start-btn" class="taskbar-btn" title="Start">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 22,12 12,22 2,12"/></svg>
      </button>
      <div id="taskbar-apps"></div>
      <div id="system-tray">
        <button id="ai-center-btn" class="taskbar-btn" title="AI Command Center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        </button>
        <button id="notifications-btn" class="taskbar-btn" title="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span id="notification-badge" class="badge hidden">0</span>
        </button>
        <div id="clock" class="taskbar-info"></div>
      </div>
    </div>
  </div>

  <div id="start-menu" class="hidden">
    <div class="start-menu-header">
      <div class="start-menu-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="start-search" placeholder="Search apps, settings, commands...">
      </div>
    </div>
    <div class="start-menu-body">
      <div class="start-menu-section">
        <h3>Pinned</h3>
        <div id="pinned-apps" class="app-grid"></div>
      </div>
      <div class="start-menu-section">
        <h3>All Applications</h3>
        <div id="all-apps" class="app-list"></div>
      </div>
    </div>
    <div class="start-menu-footer">
      <div class="user-info">
        <div class="user-avatar">A</div>
        <span>Arcanis User</span>
      </div>
      <div class="power-options">
        <button id="settings-btn" class="start-footer-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="power-btn" class="start-footer-btn" title="Power">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="ai-center" class="hidden">
    <div class="ai-center-header">
      <div class="ai-center-title">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        <span>ArcanisBrain AI</span>
      </div>
      <button id="ai-center-close" class="ai-close-btn">&times;</button>
    </div>
    <div id="ai-chat" class="ai-chat-area"></div>
    <div class="ai-center-input">
      <input type="text" id="ai-input" placeholder="Ask Arcanis anything... (e.g., 'open terminal', 'create workflow', 'change theme')">
      <button id="ai-send" class="ai-send-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <div id="notifications-panel" class="hidden">
    <div class="notif-header">
      <h3>Notifications</h3>
      <button id="clear-notifs">Clear all</button>
    </div>
    <div id="notifications-list"></div>
  </div>

  <div id="context-menu" class="hidden"></div>

  <script src="js/core/window-manager.js"></script>
  <script src="js/core/taskbar.js"></script>
  <script src="js/core/notifications.js"></script>
  <script src="js/core/desktop.js"></script>
  <script src="js/core/workspace.js"></script>
  <script src="js/ai/ai-center.js"></script>
  <script src="js/ai/workflows.js"></script>
  <script src="js/apps/terminal.js"></script>
  <script src="js/apps/file-manager.js"></script>
  <script src="js/apps/settings.js"></script>
  <script src="js/apps/text-editor.js"></script>
  <script src="js/apps/browser.js"></script>
  <script src="js/integration.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
